<!DOCTYPE html><html>
<head><title>Pi Testnet Reward</title><script src="https://sdk.minepi.com/pi-sdk.js"></script><style>

body{
font-family:Arial;
background:#f4f6fb;
padding:20px;
}

.card{
background:white;
padding:20px;
border-radius:15px;
max-width:500px;
margin:auto;
box-shadow:0 5px 20px #ddd;
}

button{

width:100%;
padding:15px;
margin-top:10px;
border:none;
border-radius:10px;
font-size:16px;
cursor:pointer;

}

.connect{
background:#ffb300;
}

.send{
background:#6c5ce7;
color:white;
}


input{

width:100%;
padding:12px;
margin-top:8px;
border-radius:8px;
border:1px solid #ccc;

}


.wallet{

background:#eee;
padding:10px;
margin-top:8px;
border-radius:8px;

}

</style></head><body><div class="card"><h2>🥧 Pi Testnet Reward</h2><button class="connect" onclick="connectPi()">
🔑 Connecter Pi
</button><p id="user">
Non connecté
</p><h3>Wallets Testnet</h3><input id="w1" placeholder="Wallet 1">
<input id="w2" placeholder="Wallet 2">
<input id="w3" placeholder="Wallet 3">
<input id="w4" placeholder="Wallet 4">
<input id="w5" placeholder="Wallet 5"><button class="send" onclick="startQueue()">
🚀 Envoyer 0.01 π aux 5 wallets
</button><h3>Historique</h3><div id="history"></div></div><script>


let user=null;



Pi.init({

version:"2.0",

sandbox:true

});




// Connexion Pi

async function connectPi(){


try{


user = await Pi.authenticate(

["username"],

function(payment){

console.log(payment);

}

);



document.getElementById("user").innerHTML=

"✅ Connecté : "+user.username;



}

catch(e){

alert(e);

}


}







let wallets=[];

let history=[];



function displayHistory(){


let box=document.getElementById("history");


box.innerHTML="";


history.forEach(item=>{


box.innerHTML +=

`

<div class="wallet">

${item.wallet}

<br>

${item.status}

</div>

`;

});


}







async function startQueue(){


if(!user){

alert("Connecte Pi avant");

return;

}



wallets=[

document.getElementById("w1").value,

document.getElementById("w2").value,

document.getElementById("w3").value,

document.getElementById("w4").value,

document.getElementById("w5").value

];



wallets = wallets.filter(x=>x);



for(let wallet of wallets){


history.push({

wallet:wallet,

status:"⏳ En cours"

});


displayHistory();



try{


await sendPayment(wallet);



updateStatus(wallet,"✅ Envoyé");



}

catch(error){


updateStatus(wallet,"❌ Erreur");


console.log(error);



}


}



alert("Terminé");


}






function updateStatus(wallet,status){


let item=history.find(

x=>x.wallet===wallet

);


if(item){

item.status=status;

displayHistory();

}


}









async function sendPayment(wallet){



// création paiement


let create = await fetch(

"/api/create-payment",

{

method:"POST",

headers:{

"Content-Type":"application/json"

},

body:JSON.stringify({

amount:0.01,

recipient:wallet

})


}

);



let payment = await create.json();



if(!payment.identifier){

throw "Création paiement échouée";

}



let paymentId=payment.identifier;



// APPROBATION PI BROWSER


let approval = await Pi.createPayment(

{

amount:0.01,

memo:"Testnet reward",

metadata:{

recipient:wallet

}

},


{


onReadyForServerApproval: async function(id){


await fetch("/api/approve",

{

method:"POST",

headers:{

"Content-Type":"application/json"

},

body:JSON.stringify({

paymentId:id

})

});


},



onReadyForServerCompletion: async function(id,txid){



await fetch("/api/complete",

{

method:"POST",

headers:{

"Content-Type":"application/json"

},

body:JSON.stringify({

paymentId:id,

txid:txid

})

});


},



onCancel:function(){

throw "Paiement annulé";

},


onError:function(error){

throw error;

}


}

);



}



</script></body>
  </html>
