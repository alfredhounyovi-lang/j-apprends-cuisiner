<!DOCTYPE html>

<html>

<head>

<title>Pi Testnet Reward</title>

<script src="https://sdk.minepi.com/pi-sdk.js"></script>


<style>

body{

font-family:Arial;

background:#f5f5f5;

padding:20px;

}


.card{

max-width:500px;

margin:auto;

background:white;

padding:20px;

border-radius:15px;

}


button{

width:100%;

padding:15px;

margin-top:10px;

border:0;

border-radius:10px;

font-size:16px;

}


.connect{

background:#f5b700;

}


.send{

background:#6c5ce7;

color:white;

}


input{

width:100%;

padding:12px;

margin-top:8px;

}


.item{

background:#eee;

padding:10px;

margin-top:8px;

border-radius:8px;

}


</style>


</head>



<body>


<div class="card">


<h2>🥧 Pi Testnet Reward</h2>


<button class="connect" onclick="connectPi()">

🔑 Connecter Pi

</button>


<p id="user">

Non connecté

</p>



<h3>Wallets Testnet</h3>


<input id="w1" placeholder="Wallet 1">

<input id="w2" placeholder="Wallet 2">

<input id="w3" placeholder="Wallet 3">

<input id="w4" placeholder="Wallet 4">

<input id="w5" placeholder="Wallet 5">


<button class="send" onclick="startSend()">

🚀 Envoyer 0.01 π

</button>



<h3>Historique</h3>


<div id="history"></div>


</div>





<script>


Pi.init({

version:"2.0",

sandbox:true

});



let user=null;

let history=[];



async function connectPi(){


try{


const result =
await Pi.authenticate(

["username"],

payment=>{

console.log(payment);

}

);



console.log(result);


user=result;



document.getElementById("user").innerHTML=

"✅ Connecté : "

+ result.user.username;



}

catch(error){

console.log(error);

alert("Connexion échouée");

}


}







function showHistory(){


let box=document.getElementById("history");


box.innerHTML="";


history.forEach(x=>{


box.innerHTML +=`

<div class="item">

${x.wallet}

<br>

${x.status}

</div>

`;


});


}







async function startSend(){



if(!user){

alert("Connecte Pi");

return;

}



let wallets=[

w1.value,

w2.value,

w3.value,

w4.value,

w5.value

].filter(x=>x);



for(let wallet of wallets){



history.push({

wallet,

status:"⏳ En cours"

});


showHistory();



try{


await sendPi(wallet);



history.find(

x=>x.wallet===wallet

).status="✅ Envoyé";



}

catch(e){


console.log(e);



history.find(

x=>x.wallet===wallet

).status="❌ "+e;



}



showHistory();



}



}








async function sendPi(wallet){



return new Promise((resolve,reject)=>{


Pi.createPayment(


{

amount:0.01,


memo:"Testnet reward",


metadata:{


recipient:wallet


}


},


{


onReadyForServerApproval:function(paymentId){



fetch("/api/create-payment",{


method:"POST",


headers:{


"Content-Type":"application/json"

},


body:JSON.stringify({


paymentId,

recipient:wallet


})


});




fetch("/api/approve",{


method:"POST",


headers:{


"Content-Type":"application/json"

},


body:JSON.stringify({


paymentId


})


});


},





onReadyForServerCompletion:function(paymentId,txid){



fetch("/api/complete",{


method:"POST",


headers:{


"Content-Type":"application/json"

},


body:JSON.stringify({


paymentId,

txid


})


})

.then(()=>resolve())

.catch(reject);



},





onCancel:function(){


reject("Annulé");


},





onError:function(error){


reject(error.message);


}



}



);


});

}



</script>


</body>

</html>
